name: Build, test, release

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

defaults:
  run:
    working-directory: ext

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
      - name: Build
        run: |
          phpize
          ./configure
          make
      - name: Test
        env:
          TEST_PHP_ARGS: "-q" #do not try to submit failures
        run: make test TESTS=--show-diff

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}

      - name: build
        run: |
          phpize
          ./configure
          make

      - name: test
        env:
          TEST_PHP_ARGS: "-q" #do not try to submit failures
        run: make test TESTS=--show-diff

  pecl-package:
    runs-on: ubuntu-latest
    container:
      image: php:8.5-cli@sha256:b070c68324c164aa1a656e25fde6474be4d0d1677fbb83e909e7eb2ed5e28a93
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Package and copy
        run: |
          mkdir binaries
          pear package-validate
          pear package
          cp opentelemetry-*.tgz binaries/
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opentelemetry-pecl
          path: ext/binaries/*.tgz
          if-no-files-found: error

  windows:
    runs-on: windows-2025
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        ts: ['ts', 'nts']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PHP ${{ matrix.php }}-${{ matrix.ts }}
        id: setup-php-sdk
        uses: php/setup-php-sdk@e2ce1c294f272ed93e8083f14649f5adadf93788 # v0.12
        with:
          version: ${{ matrix.php }}
          arch: x64
          ts: ${{ matrix.ts }}
      - name: Install dependencies
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64
          toolset: ${{ steps.setup-php-sdk.outputs.toolset }}
      - name: Build
        run: |
          phpize
          ./configure --enable-opentelemetry --with-prefix=${{ steps.setup-php-sdk.outputs.prefix }}
          nmake
      - name: Test
        env:
          TEST_PHP_ARGS: "-q"
        run: nmake test TESTS=--show-diff
      - name: Get Compiler Version + Build Name
        shell: bash
        run: |
          case "$VisualStudioVersion" in
            16.*) COMPILER="vs16";;
            17.*) COMPILER="vs17";;
            *) echo "Unknown MSVC version: $VisualStudioVersion"; exit 1;;
          esac
          echo "Detected Compiler: $COMPILER"
          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          BUILD_NAME="php_opentelemetry-${SAFE_REF_NAME}-${{matrix.php}}-${{matrix.ts}}-$COMPILER-x86_64"
          echo "Build Name: $BUILD_NAME"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: Rename and copy binaries
        run: |
          md binaries\${{env.BUILD_NAME}}
          $file = Get-ChildItem -Path x64 -Recurse -Filter php_opentelemetry.dll
          Copy-Item -Path $file.FullName -Destination "binaries\${{env.BUILD_NAME}}\${{env.BUILD_NAME}}.dll"
      - name: Find
        run: |
          Get-ChildItem -Path binaries -Recurse -Force | ForEach-Object { $_.FullName }
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{env.BUILD_NAME}}
          path: ext\binaries\${{env.BUILD_NAME}}\${{env.BUILD_NAME}}.dll
          if-no-files-found: error

  release-if-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, pecl-package, windows]
    permissions:
      contents: write # required for creating releases
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: download-artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ext/artifacts
      - name: zip
        run: |
          cd artifacts
          find . -maxdepth 1 -type d -exec zip -jr {}.zip {} \;
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          draft: true
          files: "ext/artifacts/*.zip"
